name: Cygnet Safari
options:
  deploymentTarget:
    macOS: "13.3"
settings:
  base:
    CYGNET_BUNDLE_ID_PREFIX: com.example.cygnet
    MARKETING_VERSION: 0.1.1
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
    CODE_SIGN_STYLE: Automatic
targets:
  Cygnet Safari:
    type: application
    platform: macOS
    deploymentTarget: "13.3"
    info:
      path: Shared (App)/Generated/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: Copyright © 2026 Cygnet
        CygnetSafariExtensionBundleIdentifier: "$(EXTENSION_BUNDLE_IDENTIFIER)"
    entitlements:
      path: Shared (App)/Generated/Cygnet Safari.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_NAME: Cygnet Safari
        PRODUCT_BUNDLE_IDENTIFIER: "$(CYGNET_BUNDLE_ID_PREFIX).safari"
        EXTENSION_BUNDLE_IDENTIFIER: "$(CYGNET_BUNDLE_ID_PREFIX).safari.extension"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Shared (App)
        excludes:
          - Generated/**
    dependencies:
      - target: Cygnet Safari Extension
        embed: true
  Cygnet Safari Extension:
    type: app-extension
    platform: macOS
    deploymentTarget: "13.3"
    info:
      path: Shared (Extension)/Generated/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).SafariWebExtensionHandler"
    entitlements:
      path: Shared (Extension)/Generated/Cygnet Safari Extension.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_NAME: Cygnet Safari Extension
        PRODUCT_BUNDLE_IDENTIFIER: "$(CYGNET_BUNDLE_ID_PREFIX).safari.extension"
    sources:
      - path: Shared (Extension)
        excludes:
          - Generated/**
          - Resources/ExtensionBundle/**
      - path: Shared (Extension)/Resources/ExtensionBundle
        type: folder
        buildPhase: none
        optional: true
    preBuildScripts:
      - name: Validate Safari Web Extension Bundle
        script: |
          set -euo pipefail
          BUNDLE_DIR="${SRCROOT}/Shared (Extension)/Resources/ExtensionBundle"
          if [[ ! -f "${BUNDLE_DIR}/manifest.json" ]]; then
            echo "error: Safari web extension bundle not found. Run ./scripts/build-safari-web-extension.sh first."
            exit 1
          fi
    postBuildScripts:
      - name: Sync Safari Web Extension Resources
        script: |
          set -euo pipefail
          BUNDLE_DIR="${SRCROOT}/Shared (Extension)/Resources/ExtensionBundle"
          DESTINATION_DIR="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Resources"
          mkdir -p "${DESTINATION_DIR}"
          rsync -a --delete "${BUNDLE_DIR}/" "${DESTINATION_DIR}/"
schemes:
  Cygnet Safari:
    build:
      targets:
        Cygnet Safari: all
    archive:
      config: Release
